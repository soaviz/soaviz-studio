# soaviz studio backend — Fly.io 설정
# 사용: `fly launch` (한 번) 후 `fly deploy`
app = "soaviz-studio-api"
primary_region = "nrt"   # 도쿄 (한국 사용자에게 가장 가까움)
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  PORT = "8787"
  RATE_LIMIT_PER_MIN = "60"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1

# 시크릿은 CLI로 등록:
#   fly secrets set OPENAI_API_KEY=sk-... ELEVENLABS_API_KEY=... \
#                   REPLICATE_API_TOKEN=... ANTHROPIC_API_KEY=... \
#                   ALLOWED_ORIGINS=https://soaviz.studio,https://app.soaviz.studio \
#                   SENTRY_DSN=...
