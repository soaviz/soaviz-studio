name: Supabase Keep-Alive

# 목적: Supabase Free 플랜 자동 일시정지(7일 비활성) 방지
# 동작: 매일 KST 정오(UTC 03:00) Supabase REST API 에 GET 요청
# 비용: GitHub Actions 무료 한도 안에서 충분 (월 ~1분)
# Fly.io keep-alive 와 이중화. 둘 중 하나만 살아있어도 OK.

on:
  schedule:
    - cron: '0 3 * * *'    # 매일 UTC 03:00 = KST 12:00 — keep-alive
    - cron: '10 3 1 * *'   # 매월 1일 UTC 03:10 = KST 12:10 — 크레딧 월간 리셋
  workflow_dispatch: {}   # GitHub UI에서 수동 실행 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 3 * * *'
    steps:
      - name: Ping Supabase REST endpoint
        run: |
          URL="https://yfzhvuyrdabpzowprupa.supabase.co/rest/v1/"
          echo "Pinging: $URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L "$URL" || echo "000")
          echo "HTTP status: $STATUS"
          # 200, 401, 404 모두 "서버 응답함" 으로 간주 — 일시정지면 NXDOMAIN/000
          if [ "$STATUS" = "000" ]; then
            echo "::error::Supabase 응답 없음 — 일시정지 가능성. Dashboard 확인 필요"
            exit 1
          fi
          echo "✅ Supabase alive — keep-alive 성공"

  # 매월 1일 크레딧 리셋 — reset_monthly_credits() RPC 호출
  # 필요 Secret: SUPABASE_SERVICE_ROLE_KEY (repo Settings → Secrets → Actions)
  monthly-credit-reset:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: github.event.schedule == '10 3 1 * *'
    steps:
      - name: Reset monthly credits via RPC
        run: |
          if [ -z "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY secret 미설정 — repo Settings에서 추가 필요"
            exit 1
          fi
          STATUS=$(curl -s -o /tmp/out.json -w "%{http_code}" -X POST \
            "https://yfzhvuyrdabpzowprupa.supabase.co/rest/v1/rpc/reset_monthly_credits" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" -d '{}')
          echo "HTTP status: $STATUS / 리셋된 지갑 수: $(cat /tmp/out.json)"
          if [ "$STATUS" != "200" ]; then
            echo "::error::크레딧 리셋 실패 — 응답: $(cat /tmp/out.json)"
            exit 1
          fi
          echo "✅ 월간 크레딧 리셋 완료"
